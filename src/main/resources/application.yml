spring:
  application:
    name: loja-papelaria
  profiles:
    default: dev # usado somente se nenhum perfil for ativado por fora (env var, --spring.profiles.active, etc.)
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # o schema é sempre gerenciado pelo Flyway, nunca pelo Hibernate
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

melhorenvio:
  base-url: ${MELHOR_ENVIO_BASE_URL:https://sandbox.melhorenvio.com.br}
  token: ${MELHOR_ENVIO_TOKEN:}
  user-agent: ${MELHOR_ENVIO_USER_AGENT:Loja de Papelaria (contato@lojadepapelaria.com.br)}
