<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title th:text="${q != null} ? 'Busca' : (${nomeCategoriaSelecionada} ?: 'Produtos')">Produtos</title>
</head>
<body>
<main layout:fragment="content">
    <section class="container" style="padding: var(--espaco-6) 0;">

        <!-- Cabeçalho: título muda conforme busca/categoria/catálogo completo -->
        <div class="secao__cabecalho">
            <span class="etiqueta" th:if="${q != null}">Resultados da busca</span>
            <span class="etiqueta" th:unless="${q != null}">Catálogo</span>
            <h1 th:if="${q != null}" th:text="'“' + ${q} + '”'">Busca</h1>
            <h1 th:unless="${q != null}" th:text="${nomeCategoriaSelecionada} ?: 'Todos os produtos'">Produtos</h1>
        </div>

        <!-- UC-04: campo de busca -->
        <form action="/produtos" method="get" style="margin-bottom: var(--espaco-5); max-width: 420px;">
            <div style="display:flex; gap:8px;">
                <input type="search" name="q" placeholder="Buscar produtos..." minlength="2"
                       th:value="${q}"
                       style="flex:1; height:38px; padding:0 12px; border:1px solid var(--cor-borda); border-radius: var(--raio-botao); font-family: var(--fonte-corpo);">
                <button type="submit" class="botao botao-secundario">Buscar</button>
            </div>
        </form>

        <!-- UC-02, passo 3: filtro por categoria (navegação plana — RN-38) -->
        <div th:if="${q == null}" style="display:flex; gap:8px; overflow-x:auto; padding-bottom: var(--espaco-3); margin-bottom: var(--espaco-2);">
            <a th:href="@{/produtos(ordenar=${ordenar})}"
               th:classappend="${categoriaId == null} ? 'botao-primario' : 'botao-secundario'"
               class="botao" style="padding:6px 14px; font-size: var(--tamanho-pequeno); white-space:nowrap;">Todos</a>
            <a th:each="categoria : ${categorias}"
               th:href="@{/produtos(categoriaId=${categoria.id}, ordenar=${ordenar})}"
               th:text="${categoria.nome}"
               th:classappend="${categoriaId != null and categoriaId == categoria.id} ? 'botao-primario' : 'botao-secundario'"
               class="botao" style="padding:6px 14px; font-size: var(--tamanho-pequeno); white-space:nowrap;">Categoria</a>
        </div>

        <!-- UC-02, passo 4: ordenação -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--espaco-5);">
            <span class="etiqueta" th:text="${produtos.totalElements} + ' produto(s)'">0 produtos</span>
            <select onchange="location.href=this.value" style="font-family: var(--fonte-utilitaria); font-size: var(--tamanho-etiqueta); border:1px solid var(--cor-borda); border-radius: var(--raio-botao); padding:6px 10px; background:var(--cor-papel);">
                <option th:value="@{/produtos(categoriaId=${categoriaId}, q=${q}, ordenar='recentes')}"
                        th:selected="${ordenar == 'recentes'}">Mais recentes</option>
                <option th:value="@{/produtos(categoriaId=${categoriaId}, q=${q}, ordenar='preco_asc')}"
                        th:selected="${ordenar == 'preco_asc'}">Menor preço</option>
                <option th:value="@{/produtos(categoriaId=${categoriaId}, q=${q}, ordenar='preco_desc')}"
                        th:selected="${ordenar == 'preco_desc'}">Maior preço</option>
                <option th:value="@{/produtos(categoriaId=${categoriaId}, q=${q}, ordenar='nome')}"
                        th:selected="${ordenar == 'nome'}">Nome (A-Z)</option>
            </select>
        </div>

        <!-- UC-02, 3a / UC-04, 2a: estados vazios -->
        <div th:if="${produtos.totalElements == 0}" style="padding: var(--espaco-7) 0; text-align:center;">
            <p th:if="${q != null}" th:text="'Nenhum produto encontrado para “' + ${q} + '”. Tente outro termo ou navegue pelas categorias.'">
                Nenhum produto encontrado.
            </p>
            <p th:unless="${q != null}">Nenhum produto encontrado nesta categoria.</p>
            <a href="/produtos" class="botao botao-secundario">Ver todos os produtos</a>
        </div>

        <!-- Grid de produtos -->
        <div class="grid-produtos" th:if="${produtos.totalElements > 0}">
            <a th:each="produto : ${produtos.content}"
               th:href="@{/produto/{id}(id=${produto.id})}"
               class="card-produto">
                <div class="card-produto__imagem">
                    <img th:if="${produto.imagemCapa != null}" th:src="${produto.imagemCapa}"
                         th:alt="${produto.nome}">
                    <span th:if="${produto.novo}" class="selo selo--novo selo--pequeno"
                          style="position:absolute; top:8px; left:8px;">NOVO</span>
                    <span th:if="${produto.esgotado}" class="selo selo--esgotado selo--pequeno"
                          style="position:absolute; top:8px; left:8px;">ESGOTADO</span>
                </div>
                <div class="card-produto__nome" th:text="${produto.nome}">Nome do produto</div>
                <div class="preco"
                     th:text="'R$ ' + ${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">
                    R$ 0,00
                </div>
            </a>
        </div>

        <!-- Paginação simples (D8: ~20 produtos no lançamento, paginação rara mas presente) -->
        <div th:if="${produtos.totalPages > 1}"
             style="display:flex; justify-content:center; align-items:center; gap:var(--espaco-4); margin-top: var(--espaco-7);">
            <a th:if="${produtos.hasPrevious()}"
               th:href="@{/produtos(categoriaId=${categoriaId}, q=${q}, ordenar=${ordenar}, page=${produtos.number - 1})}"
               class="botao botao-secundario">&larr; Anterior</a>
            <span class="etiqueta" th:text="'Página ' + (${produtos.number} + 1) + ' de ' + ${produtos.totalPages}">
                Página 1 de 1
            </span>
            <a th:if="${produtos.hasNext()}"
               th:href="@{/produtos(categoriaId=${categoriaId}, q=${q}, ordenar=${ordenar}, page=${produtos.number + 1})}"
               class="botao botao-secundario">Próxima &rarr;</a>
        </div>

    </section>
</main>
</body>
</html>
