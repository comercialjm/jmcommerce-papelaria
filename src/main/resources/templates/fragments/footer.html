<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<footer th:fragment="footer" class="rodape">
    <div class="container rodape__conteudo">
        <div class="rodape__colunas">
            <div>
                <div class="rodape__titulo">Loja de Papelaria</div>
                <p class="rodape__texto">Papelaria selecionada com cuidado, para quem gosta de escrever, planejar e guardar memórias no papel.</p>
            </div>
            <div>
                <div class="rodape__titulo">Atendimento</div>
                <!-- TODO (M8): substituir pelos dados reais de configuracao_loja -->
                <p class="rodape__texto">contato@lojadepapelaria.com.br<br>(00) 00000-0000</p>
            </div>
            <div>
                <div class="rodape__titulo">Navegação</div>
                <p><a href="/produtos" class="rodape__link">Todos os produtos</a></p>
                <p><a href="/carrinho" class="rodape__link">Meu carrinho</a></p>
            </div>
        </div>

        <div class="rodape__assinatura">
            <span>&copy; <span th:text="${#calendars.format(#calendars.createNow(),'yyyy')}">2026</span> Loja de Papelaria</span>
            <!-- RN-45: link fixo no código, não editável pelo admin -->
            <span>Desenvolvido por <a href="https://www.jmcodestudio.com.br" target="_blank" rel="noopener">JM Code Studio</a></span>
        </div>
    </div>
</footer>

</body>
</html>
