server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/loja_papelaria
    username: loja_papelaria
    password: loja_papelaria
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false # recarrega templates sem precisar reiniciar a aplicação

logging:
  level:
    com.jmcodestudio.papelaria: DEBUG
