server:
  port: ${PORT:8080} # o Render injeta a variável PORT automaticamente

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
  thymeleaf:
    cache: true

logging:
  level:
    com.jmcodestudio.papelaria: INFO
