<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Início</title>
</head>
<body>
<main layout:fragment="content">

    <!-- UC-01: Banner hero (RN-46/47 — fallback quando o admin não configurou nenhum) -->
    <section class="hero"
              th:classappend="${banner.imagemUrl != null ? 'hero--com-imagem' : ''}"
              th:style="${banner.imagemUrl != null ? 'background-image:url(' + banner.imagemUrl + ')' : ''}">
        <div class="container">
            <div class="hero__conteudo">
                <h1 th:text="${banner.titulo}">Papelaria, com caráter.</h1>
                <p th:text="${banner.subtitulo}">Cadernos, agendas e canetas escolhidos com cuidado.</p>
                <a th:href="${banner.link}" class="botao botao-primario">Ver produtos</a>
            </div>
        </div>
    </section>

    <!-- UC-01: Categorias navegáveis (RN-38 — apenas nível 1, ativas) -->
    <section class="secao container" th:if="${!categorias.isEmpty()}">
        <div class="secao__cabecalho">
            <span class="etiqueta">Explore</span>
            <h2>Categorias</h2>
        </div>
        <div class="grid-categorias">
            <a th:each="categoria : ${categorias}"
               th:href="@{/produtos(categoriaId=${categoria.id})}"
               class="categoria-card">
                <div class="categoria-card__imagem">
                    <img th:if="${categoria.imagemUrl != null}" th:src="${categoria.imagemUrl}"
                         th:alt="${categoria.nome}">
                </div>
                <div class="categoria-card__nome" th:text="${categoria.nome}">Categoria</div>
            </a>
        </div>
    </section>

    <!-- UC-01: Produtos em destaque (mais recentes) -->
    <section class="secao container" th:if="${!produtosDestaque.isEmpty()}">
        <div class="secao__cabecalho">
            <span class="etiqueta">Recém-chegados</span>
            <h2>Novidades</h2>
        </div>
        <div class="grid-produtos">
            <a th:each="produto : ${produtosDestaque}"
               th:href="@{/produto/{id}(id=${produto.id})}"
               class="card-produto">
                <div class="card-produto__imagem">
                    <img th:if="${produto.imagemCapa != null}" th:src="${produto.imagemCapa}"
                         th:alt="${produto.nome}">
                    <span th:if="${produto.novo}" class="selo selo--novo selo--pequeno"
                          style="position:absolute; top:8px; left:8px;">NOVO</span>
                    <span th:if="${produto.esgotado}" class="selo selo--esgotado selo--pequeno"
                          style="position:absolute; top:8px; left:8px;">ESGOTADO</span>
                </div>
                <div class="card-produto__nome" th:text="${produto.nome}">Nome do produto</div>
                <div class="preco"
                     th:text="'R$ ' + ${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">
                    R$ 0,00
                </div>
            </a>
        </div>
    </section>

</main>
</body>
</html>
